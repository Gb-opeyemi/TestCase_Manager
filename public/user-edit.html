<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit User | TestCase Manager</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header dashboard-header">
      <div class="container">
        <nav class="topbar" aria-label="Primary">
          <a class="brand-mark" href="/dashboard.html">TestCase Manager</a>
          <div class="topbar-actions">
            <a class="button button-secondary" href="/dashboard.html">Dashboard</a>
          </div>
        </nav>

        <section class="dashboard-hero">
          <div>
            <p class="page-label">Users</p>
            <h1 class="dashboard-title">Edit user</h1>
          </div>
        </section>
      </div>
    </header>

    <main class="container dashboard-content">
      <section class="dashboard-panel form-panel">
        <form class="testcase-form" id="edit-user-form">
          <div class="form-grid">
            <label class="form-field">
              <span>Full name</span>
              <input name="fullName" type="text" required />
            </label>

            <label class="form-field">
              <span>Email</span>
              <input name="email" type="email" required />
            </label>

            <label class="form-field">
              <span>Password</span>
              <input name="password" type="text" required />
            </label>

            <label class="form-field">
              <span>Role</span>
              <select name="role" required>
                <option value="">Select role</option>
                <option>Admin</option>
                <option>Tester</option>
                <option>Developer</option>
                <option>Stakeholder</option>
              </select>
            </label>
          </div>

          <div class="form-actions">
            <button class="button button-primary" type="submit">Save changes</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/notifications.js"></script>
    <script src="/js/user-edit.js"></script>
  </body>
</html>
