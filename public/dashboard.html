<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | TestCase Manager</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header dashboard-header">
      <div class="container">
        <nav class="topbar" aria-label="Primary">
          <a class="brand-mark" href="/dashboard.html">TestCase Manager</a>
          <div class="topbar-actions">
            <a class="button button-secondary" href="/testcases.html">Test cases</a>
            <a class="button button-secondary" href="/testcase-create.html">New test case</a>
            <button class="button button-primary" id="logout-button" type="button">
              Sign out
            </button>
          </div>
        </nav>

        <section class="dashboard-hero">
          <div>
            <p class="page-label">Dashboard</p>
            <h1 class="dashboard-title">Overview</h1>
            <p class="intro" id="dashboard-subtitle">Loading dashboard...</p>
          </div>
        </section>
      </div>
    </header>

    <main class="container dashboard-content">
      <section class="metrics-grid">
        <article class="metric-card">
          <span class="metric-label">Total</span>
          <strong class="metric-value" id="total-count">0</strong>
        </article>

        <article class="metric-card">
          <span class="metric-label">Passed</span>
          <strong class="metric-value" id="passed-count">0</strong>
        </article>

        <article class="metric-card">
          <span class="metric-label">Failed</span>
          <strong class="metric-value" id="failed-count">0</strong>
        </article>

        <article class="metric-card">
          <span class="metric-label">Pending</span>
          <strong class="metric-value" id="pending-count">0</strong>
        </article>
      </section>

      <section class="dashboard-panel">
        <div class="panel-heading">
          <h2>Recent activity</h2>
        </div>
        <div class="activity-list" id="activity-list"></div>
      </section>
    </main>

    <script src="/js/dashboard.js"></script>
  </body>
</html>
