<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Case Detail | TestCase Manager</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header dashboard-header">
      <div class="container">
        <nav class="topbar" aria-label="Primary">
          <a class="brand-mark" href="/dashboard.html">TestCase Manager</a>
          <div class="topbar-actions">
            <a class="button button-secondary" href="/testcases.html">Back to list</a>
          </div>
        </nav>

        <section class="dashboard-hero detail-header-row">
          <div>
            <p class="page-label">Detail</p>
            <h1 class="dashboard-title" id="detail-title">Test case</h1>
            <p class="intro" id="detail-subtitle">Loading...</p>
          </div>

          <div class="detail-actions">
            <a class="button button-primary" id="edit-button" href="/testcases.html">Edit</a>
            <button class="button button-danger" id="delete-button" type="button">
              Delete
            </button>
          </div>
        </section>
      </div>
    </header>

    <main class="container dashboard-content detail-layout">
      <section class="dashboard-panel">
        <div class="panel-heading">
          <h2>Details</h2>
        </div>
        <div class="detail-sections" id="detail-sections"></div>
      </section>

      <section class="dashboard-panel">
        <div class="panel-heading">
          <h2>Comments</h2>
        </div>

        <form class="comment-form" id="comment-form">
          <label class="form-field form-field-full">
            <span>Comment</span>
            <textarea id="comment-content" name="content" rows="3"></textarea>
          </label>

          <div class="form-actions">
            <button class="button button-primary" type="submit">Add comment</button>
          </div>
        </form>

        <div class="comments-list" id="comments-list"></div>
      </section>
    </main>

    <script src="/js/notifications.js"></script>
    <script src="/js/testcase-detail.js"></script>
  </body>
</html>
