<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management | TestCase Manager</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header dashboard-header">
      <div class="container">
        <nav class="topbar" aria-label="Primary">
          <a class="brand-mark" href="/dashboard.html">TestCase Manager</a>
          <div class="topbar-actions">
            <a class="button button-secondary" href="/dashboard.html">Dashboard</a>
            <a class="button button-secondary" href="/testcases.html">Test cases</a>
          </div>
        </nav>

        <section class="dashboard-hero">
          <div>
            <p class="page-label">Users</p>
            <h1 class="dashboard-title">User management</h1>
            <p class="intro">Manage users and assign roles.</p>
          </div>
        </section>
      </div>
    </header>

    <main class="container dashboard-content user-layout">
      <section class="dashboard-panel form-panel">
        <div class="panel-heading">
          <h2>Create user</h2>
        </div>

        <form class="testcase-form" id="create-user-form">
          <div class="form-grid">
            <label class="form-field">
              <span>Full name</span>
              <input name="fullName" type="text" required />
            </label>

            <label class="form-field">
              <span>Email</span>
              <input name="email" type="email" required />
            </label>

            <label class="form-field">
              <span>Password</span>
              <input name="password" type="text" required />
            </label>

            <label class="form-field">
              <span>Role</span>
              <select name="role" required>
                <option value="">Select role</option>
                <option>Admin</option>
                <option>Tester</option>
                <option>Developer</option>
                <option>Stakeholder</option>
              </select>
            </label>
          </div>

          <div class="form-actions">
            <button class="button button-primary" type="submit">Create user</button>
          </div>
        </form>
      </section>

      <section class="dashboard-panel">
        <div class="panel-heading">
          <h2>All users</h2>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/js/notifications.js"></script>
    <script src="/js/user-management.js"></script>
  </body>
</html>
